name: 一键注册 Stackryze 域名并托管到 Cloudflare

on:
  workflow_dispatch:
    inputs:
      github_email:
        description: 'GitHub 邮箱（Stackryze 登录用）'
        required: true
      github_password:
        description: 'GitHub 密码（Stackryze 登录用）'
        required: true
      domain_prefix:
        description: '域名前缀（如 myapp）'
        required: true
      cf_email:
        description: 'Cloudflare 邮箱'
        required: true
      cf_api_key:
        description: 'Cloudflare API Key'
        required: true
      server_ip:
        description: '服务器 IP（可选，默认 192.168.1.1）'
        required: false
        default: '192.168.1.1'

env:
  PYTHON_VERSION: '3.11'

jobs:
  register-and-configure:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
        playwright install-deps chromium
    
    - name: 运行自动化脚本
      run: |
        python auto_register.py << EOF
        ${{ github.event.inputs.github_email }}
        ${{ github.event.inputs.github_password }}
        ${{ github.event.inputs.domain_prefix }}
        ${{ github.event.inputs.cf_email }}
        ${{ github.event.inputs.cf_api_key }}
        ${{ github.event.inputs.server_ip }}
        EOF
      env:
        GITHUB_EMAIL: ${{ github.event.inputs.github_email }}
        GITHUB_PASSWORD: ${{ github.event.inputs.github_password }}
        DOMAIN_PREFIX: ${{ github.event.inputs.domain_prefix }}
        CF_EMAIL: ${{ github.event.inputs.cf_email }}
        CF_API_KEY: ${{ github.event.inputs.cf_api_key }}
        SERVER_IP: ${{ github.event.inputs.server_ip }}
    
    - name: 上传截图和日志
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: automation-results
        path: |
          *.png
          *.json
          *.log
    
    - name: 显示结果
      if: success()
      run: |
        echo "🎉 自动化完成！"
        echo ""
        echo "您的域名: ${{ github.event.inputs.domain_prefix }}.indevs.in"
        echo ""
        echo "请等待几分钟让 DNS 生效，然后访问："
        echo "https://${{ github.event.inputs.domain_prefix }}.indevs.in"
        echo ""
        echo "登录 Cloudflare 查看域名："
        echo "https://dash.cloudflare.com"
    
    - name: 显示失败信息
      if: failure()
      run: |
        echo "❌ 自动化失败，请检查日志"
        echo ""
        echo "可能的原因："
        echo "1. GitHub 账号密码错误"
        echo "2. 域名已被注册"
        echo "3. Cloudflare API Key 无效"
        echo "4. 网络连接问题"